<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한컴타자 아이디 검색</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary-color); }
        button { padding: 12px 20px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { text-align: left; margin-top: 1rem; }
        .student-card { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary-color); margin-bottom: 10px; }
        .student-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .grade-tag { font-size: 0.8rem; background: #e1e8ed; padding: 2px 8px; border-radius: 4px; color: #555; }
        .info-row { margin: 5px 0; color: #444; }
        .label { color: #888; font-size: 0.9rem; width: 70px; display: inline-block; }
        .loading { color: #666; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⌨️ 한컴타자 아이디 검색</h1>
    <div id="status" class="loading">데이터를 불러오는 중...</div>
    <div class="search-box">
        <input type="text" id="nameInput" placeholder="학생 이름을 입력하세요" onkeypress="if(event.keyCode==13) searchStudent()">
        <button onclick="searchStudent()">검색</button>
    </div>
    <div id="result"></div>
</div>

<script>
    // 구글 시트 CSV 내보내기 URL (GID 포함)
    const sheetId = '1NQo-bwu1IZpqWSuFWwR7ui_33IHeGxYooWeMCmbTBv8';
    const gid = '1199999286';
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;

    let studentData = [];
    const COMMON_PW = "111aaa111";

    // 페이지 로드 시 구글 시트 데이터 가져오기
    async function loadSheetData() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            
            // CSV 파싱 (간이 방식)
            const rows = data.split('\n').slice(1); // 첫 줄(헤더) 제외
            studentData = rows.map(row => {
                // 따옴표 제거 및 콤마 분리
                const cols = row.split('","').map(col => col.replace(/"/g, ''));
                return {
                    name: cols[0] ? cols[0].trim() : "",
                    info: cols[1] ? cols[1].trim() : "",
                    id: cols[2] ? cols[2].trim() : ""
                };
            }).filter(s => s.name !== ""); // 빈 줄 제거

            document.getElementById('status').innerText = "✅ 데이터를 성공적으로 불러왔습니다.";
            setTimeout(() => document.getElementById('status').style.display = 'none', 2000);
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('status').innerText = "❌ 데이터를 불러오지 못했습니다. 공유 설정을 확인하세요.";
        }
    }

    function searchStudent() {
        const query = document.getElementById('nameInput').value.trim();
        const resultArea = document.getElementById('result');
        
        if (!query) {
            alert("이름을 입력해주세요.");
            return;
        }

        const filtered = studentData.filter(s => s.name === query);
        
        if (filtered.length > 0) {
            let html = '';
            filtered.forEach(student => {
                html += `
                    <div class="student-card">
                        <div class="student-name">
                            ${student.name} 
                            ${student.info ? `<span class="grade-tag">${student.info}</span>` : ''}
                        </div>
                        <div class="info-row"><span class="label">아이디:</span> <strong>${student.id}</strong></div>
                        <div class="info-row"><span class="label">비밀번호:</span> <strong>${COMMON_PW}</strong></div>
                    </div>
                `;
            });
            resultArea.innerHTML = html;
        } else {
            resultArea.innerHTML = `<div style="text-align:center; color:#ff4d4f; padding:20px;">'${query}' 학생을 찾을 수 없습니다.</div>`;
        }
    }

    // 초기 데이터 로드 실행
    loadSheetData();
</script>

</body>
</html>
