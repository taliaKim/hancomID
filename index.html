    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한컴타자 아이디 검색</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--primary-color);
        }
        button {
            padding: 12px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #357abd;
        }
        #result {
            text-align: left;
            margin-top: 1rem;
        }
        .student-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .student-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .grade-tag {
            font-size: 0.8rem;
            background: #e1e8ed;
            padding: 2px 8px;
            border-radius: 4px;
            color: #555;
        }
        .info-row {
            margin: 5px 0;
            color: #444;
        }
        .label {
            color: #888;
            font-size: 0.9rem;
            width: 70px;
            display: inline-block;
        }
        .no-result {
            color: #ff4d4f;
            text-align: center;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
